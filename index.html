<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>BioQuiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: white;
            transition: 0.3s;
            margin: 0;
        }

        /* NAVBAR */
        .custom-navbar {
            background: #e9ecef;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        /* BRAND */
        .brand {
            font-weight: bold;
            font-family: Georgia, serif;
        }

        /* CUADRADOS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 800px;
            margin: auto;
        }

        .card-box {
            background: #d7f5f0;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;

            text-decoration: none;
            color: black;
            font-size: 20px;

            transition: 0.2s;
        }

        .card-box:hover {
            transform: scale(1.05);
        }

        /* DARK MODE */
        body.dark {
            background: #111;
            color: white;
        }

        body.dark .custom-navbar {
            background: #222;
            border-bottom: 1px solid #333;
        }

        body.dark .card-box {
            background: #2a4f4a;
            color: white;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="custom-navbar">
        <div class="brand">BioQuiz</div>

        <input type="checkbox" id="darkModeSwitch">
    </div>

    <!-- CONTENIDO -->
    <div class="grid">

        <a href="zoologia.html" class="card-box">Zoología</a>

        <a href="botanica.html" class="card-box">Botánica</a>

        <a href="ecologia.html" class="card-box">Ecología</a>


    </div>

    <!-- JS -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sw = document.getElementById("darkModeSwitch");

            sw.addEventListener("change", () => {
                document.body.classList.toggle("dark");
            });
        });
    </script>

</body>

</html>
