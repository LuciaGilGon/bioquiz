<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cnidarios - BioQuiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: white;
            transition: 0.3s;
            margin: 0;
        }

        .custom-navbar {
            background: #e9ecef;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .brand {
            font-weight: bold;
            font-family: Georgia, serif;
            text-decoration: none;
            color: black;
        }

        body.dark {
            background: #111;
            color: white;
        }

        body.dark .custom-navbar {
            background: #222;
            border-bottom: 1px solid #333;
        }

        /* INTRO */
        .intro {
            max-width: 800px;
            margin: 30px auto;
            text-align: center;
        }

        /* COLOR CNIDARIOS */
        :root {
            --cnidario: #ff4d6d;
        }

        /* ACCORDION STYLES */
        .accordion-button {
            font-weight: bold;
        }

        .accordion-item {
            border-radius: 12px !important;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid var(--cnidario);
        }

        /* ESTILO 1 (blanco con borde color emoji) */
        .style-1 .accordion-button {
            background: white;
            color: black;
            border: none;
        }

        .style-1 .accordion-button:not(.collapsed) {
            background: var(--cnidario);
            color: white;
        }

        /* ESTILO 2 (color con borde blanco) */
        .style-2 .accordion-button {
            background: var(--cnidario);
            color: white;
        }

        .style-2 .accordion-button:not(.collapsed) {
            background: white;
            color: black;
        }

        /* TEST BOX */
        .test-box {
            padding: 15px;
        }

        button {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="custom-navbar">
        <a href="zoologia.html" class="brand">← Zoología</a>
    </div>

    <!-- INTRO -->
    <div class="intro">
        <h1>🪼 Cnidarios</h1>
        <p>
            Los cnidarios son animales acuáticos caracterizados por su simetría radial
            y la presencia de células urticantes llamadas cnidocitos.
        </p>
    </div>

    <!-- ACORDEÓN -->
    <div class="container mb-5">

        <div class="accordion" id="cnidariosAccordion">

            <!-- TEST 1 -->
            <div class="accordion-item style-1">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#test1">
                        Test 1: Identificación básica
                    </button>
                </h2>
                <div id="test1" class="accordion-collapse collapse" data-bs-parent="#cnidariosAccordion">
                    <div class="accordion-body test-box">

                        <p>¿Qué estructura caracteriza a los cnidarios?</p>

                        <button class="btn btn-outline-primary">Cnidocitos</button><br>
                        <button class="btn btn-outline-primary">Escamas</button><br>
                        <button class="btn btn-outline-primary">Plumas</button>

                    </div>
                </div>
            </div>

            <!-- TEST 2 -->
            <div class="accordion-item style-2">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        data-bs-target="#test2">
                        Test 2: Hábitat
                    </button>
                </h2>
                <div id="test2" class="accordion-collapse collapse" data-bs-parent="#cnidariosAccordion">
                    <div class="accordion-body test-box">

                        <p>¿Dónde viven principalmente los cnidarios?</p>

                        <button class="btn btn-outline-light">Marino</button><br>
                        <button class="btn btn-outline-light">Terrestre</button><br>
                        <button class="btn btn-outline-light">Aéreo</button>

                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
