<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Botánica - BioQuiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* BASE */
        body {
            background: white;
            transition: 0.3s;
            margin: 0;
        }

        /* NAVBAR */
        .custom-navbar {
            background: #e9ecef;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .brand {
            font-weight: bold;
            font-family: Georgia, serif;
            text-decoration: none;
            color: black;
        }

        /* TÍTULO */
        h1 {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        /* CUADRADOS */
        .card-box {
            background: #d7f5f0;
            border-radius: 15px;
            height: 180px;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

            text-decoration: none;
            color: black;

            transition: 0.2s;
        }

        .card-box:hover {
            transform: translateY(-6px);
        }

        .emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 10px;
        }

        /* DARK MODE */
        body.dark {
            background: #111;
            color: white;
        }

        body.dark .custom-navbar {
            background: #222;
            border-bottom: 1px solid #333;
        }

        body.dark .brand {
            color: white !important;
        }

        body.dark .card-box {
            background: #2a4f4a;
            color: white;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="custom-navbar">
        <a href="index.html" class="brand">← BioQuiz</a>

        <input type="checkbox" id="darkModeSwitch">
    </div>

    <!-- CONTENIDO -->
    <h1>Botánica</h1>

    <div class="grid">

        <a href="#" class="card-box">
            <div>
                <span class="emoji">🍄‍🟫</span>
                <h4>Hongos</h4>
            </div>
        </a>

        <a href="#" class="card-box">
            <div>
                <span class="emoji">🍙</span>
                <h4>Algas</h4>
            </div>
        </a>

        <a href="#" class="card-box">
            <div>
                <span class="emoji">🌱</span>
                <h4>Pteridófito</h4>
            </div>
        </a>

        <a href="#" class="card-box">
            <div>
                <span class="emoji">🌲</span>
                <h4>Gimnospermas</h4>
            </div>
        </a>

        <a href="#" class="card-box">
            <div>
                <span class="emoji">🌳</span>
                <h4>Angiospermas</h4>
            </div>
        </a>

    </div>

    <!-- JS (IMPORTANTE: aquí está la clave del modo oscuro) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sw = document.getElementById("darkModeSwitch");

            if (!sw) return;

            sw.addEventListener("change", () => {
                document.body.classList.toggle("dark");
            });
        });
    </script>

</body>

</html>
